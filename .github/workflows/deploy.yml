name: Deploy to GitHub Pages

# Preparado para o go-live, mas com gatilho MANUAL por enquanto
# (workflow_dispatch). Troque para `on: push` quando:
#   1. o repositório for público OU estiver em GitHub Pro;
#   2. Settings -> Pages -> Source estiver em "GitHub Actions";
#   3. o DNS de lippelt.dev apontar para o GitHub Pages (ver public/CNAME).
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
